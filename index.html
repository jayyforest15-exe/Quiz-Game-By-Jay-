<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Quiz App</title>
<style>
body { font-family: Arial; margin:0; background:#111; color:white; }
.screen { display:none; padding:20px; }
.active { display:block; }
.card { background:#222; padding:20px; border-radius:15px; }
button { width:100%; padding:12px; margin:8px 0; border:none; border-radius:10px; }
.correct { background:green; }
.wrong { background:red; }
.question { background: linear-gradient(90deg, blue, red, yellow, green); padding:10px; border-radius:10px; }
img { max-width:100%; border-radius:10px; margin:10px 0; }
</style>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZm_IUIJWZCWhLqNii2Pijqg2RNAYqGKQ",
  authDomain: "quiz-game-jay.firebaseapp.com",
  projectId: "quiz-game-jay"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function(){
  const email = user.value + "@game.com";
  const password = pass.value;
  createUserWithEmailAndPassword(auth, email, password)
    .then(()=>alert("Registered!"))
    .catch(e=>alert(e.message));
}

window.loginUser = function(){
  const email = user.value + "@game.com";
  const password = pass.value;
  signInWithEmailAndPassword(auth, email, password)
    .then(()=>{ player=user.value; show('dev'); })
    .catch(()=>alert("Login failed"));
}
</script>
</head>
<body>

<div id="login" class="screen active">
<div class="card">
<h2>Login</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>
<button onclick="loginUser()">Login</button>
</div>
</div>

<div id="dev" class="screen">
<div class="card">
<h2>Developer</h2>
<textarea id="data" rows="6" placeholder="Q|imgURL|A|B|C|D|correctIndex"></textarea>
<button onclick="startGame()">Start</button>
</div>
</div>

<div id="game" class="screen">
<div class="card">
<div id="info"></div>
<div id="timer"></div>
<div id="q" class="question"></div>
<img id="qimg" />
<div id="answers"></div>
<div id="result"></div>
</div>
</div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
let player="";
let questions=[];
let i=0, score=0, timer, time=10;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(){
  let key="study123";
  if(new URLSearchParams(location.search).get("key")!==key){ alert("No access"); return; }

  questions = data.value.split("\n").map(l=>{
    let p=l.split("|");
    return {q:p[0], img:p[1], a:p.slice(2,6), c:parseInt(p[6])-1};
  });

  i=0; score=0;
  show('game');
  next();
}

function next(){
  if(i>=questions.length){
    q.innerText="Finished!";
    answers.innerHTML="";
    result.innerText=`Score: ${score}`;
    return;
  }

  let cur=questions[i];
  q.innerText=cur.q;
  qimg.src=cur.img;
  info.innerText=`${player} | Score: ${score}`;

  answers.innerHTML="";
  cur.a.forEach((a,idx)=>{
    let b=document.createElement('button');
    b.innerText=a;
    b.onclick=()=>check(idx,b);
    answers.appendChild(b);
  });

  startTimer();
}

function startTimer(){
  time=10;
  timer=setInterval(()=>{
    timerEl.innerText="Time: "+time;
    time--;
    if(time<0){ clearInterval(timer); showCorrect(); }
  },1000);
}

function check(idx,btn){
  clearInterval(timer);
  let cur=questions[i];
  let btns=document.querySelectorAll('#answers button');
  btns.forEach(b=>b.disabled=true);

  if(idx===cur.c){
    btn.classList.add('correct');
    correctSound.play();
    score++;
    result.innerText=randomMsg();
  } else {
    btn.classList.add('wrong');
    btns[cur.c].classList.add('correct');
    wrongSound.play();
    result.innerText="Wrong!";
  }

  i++;
  setTimeout(next,1500);
}

function showCorrect(){
  let cur=questions[i];
  let btns=document.querySelectorAll('#answers button');
  btns[cur.c].classList.add('correct');
  result.innerText="Time's up";
  i++;
  setTimeout(next,1500);
}

function randomMsg(){
  let m=["Awesome!","Great Job!","Congratulations!"];
  return m[Math.floor(Math.random()*m.length)];
}
</script>

</body>
</html>
